<body>

        </div>
    </div>

    <header class="header">
        <div class="logo">ŞÖNİL DESIGN</div>
        <nav class="nav-links">
            <div class="dropdown">
                <button class="dropbtn">İletişim <i class="fas fa-chevron-down"></i></button>
                <div class="dropdown-content">
                    <a href="https://wa.me/905439676661" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>

    <main class="content">
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterProducts('tümü')">Tüm Ürünler</button>
            <button class="filter-btn" onclick="filterProducts('buket')">Buketler</button>
            <button class="filter-btn" onclick="filterProducts('1,buket')">Tekli Buketler</button>
            <button class="filter-btn" onclick="filterProducts('anahtarlık')">Anahtarlıklar</button>
            <button class="filter-btn" onclick="filterProducts('lamba')">Lambalar</button>
        </div>

        <div id="product-list" class="product-grid">
            </div>
    </main>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div class="modal-body">
                <img id="modalImage" src="" alt="Ürün Detayı">
                <div class="modal-info">
                    <h2 id="modalName">Ürün Adı</h2>
                    <p id="modalDesc">Açıklama...</p>
                    <span id="modalPrice" class="price">0.00 TL</span>
                    <a id="modalWhatsApp" href="" class="buy-btn" target="_blank">
                        <i class="fab fa-whatsapp"></i> Sipariş Ver
